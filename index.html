<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>어머니 당뇨 식단</title>
    <meta name="description" content="큰 글씨로 보는 당뇨 외식 추천, 사진 레시피, 재료 검색">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="title-row">
        <h1>뭐 드실까요?</h1>
        <p>안심 · 주의 · 위험</p>
      </div>
      <nav class="tabs" aria-label="메뉴">
        <button type="button" data-view="recipes" aria-pressed="true">사진 레시피</button>
        <button type="button" data-view="eatingOut" aria-pressed="false">외식 추천</button>
        <button type="button" data-view="ingredients" aria-pressed="false">재료 검색</button>
        <button type="button" data-view="noodles" aria-pressed="false">면 대체</button>
        <button type="button" data-view="danger" aria-pressed="false">위험 음식</button>
      </nav>
    </header>

    <main>
      <section class="search-box" id="searchBox">
        <label for="search">음식이나 재료 검색</label>
        <input id="search" type="search" placeholder="예: 땅콩, 방울토마토, 딸기, 칼국수..." autocomplete="off">
      </section>

      <section id="content" aria-live="polite"></section>
    </main>

    <footer>
      <p>이 페이지는 음식 선택 안내입니다. 인슐린 용량, 약 조정, 치료 결정은 병원에서 확인해야 합니다.</p>
      <p>참고: 대한당뇨병학회 식품교환표, CDC Plate Method, ADA Diabetes Food Hub 레시피.</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
